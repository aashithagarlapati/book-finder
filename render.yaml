services:
  - type: web
    name: bookfinder-api
    runtime: node
    plan: free
    rootDir: books-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://bookfinder-web.onrender.com

  - type: static
    name: bookfinder-web
    rootDir: book-app-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookfinder-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html