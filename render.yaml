services:
  - type: web
    name: bookfinder-api
    runtime: node
    plan: free
    rootDir: books-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOW_DEMO_AUTH
        value: true
      - key: ALLOWED_ORIGINS
        value: https://bookfinder-web-j3hq.onrender.com

  - type: web
    name: bookfinder-web
    runtime: static
    rootDir: book-app-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookfinder-api-rwv7.onrender.com/api
      - key: VITE_ENABLE_DEMO_AUTH
        value: 'true'
      - key: VITE_DEFAULT_AUTH_MODE
        value: demo
    routes:
      - type: rewrite
        source: /*
        destination: /index.html